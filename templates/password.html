<!DOCTYPE html>
<html>
<head>
    <title>Create Password</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="auth-bg">
    <div class="overlay">

        <div class="auth-box">
            <h2>Create Password</h2>

            <form action="/set_password" method="post">

            </form>

        </div>

    </div>
</div>

</body>
</html>
